<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Rúben Mano</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #e8e8e8;
      --muted: #666;
      --danger: #e05353;
      --success: #4caf7d;
      --font: 'Courier New', monospace;
    }

    body {
      background: var(--bg);
      color: var(--accent);
      font-family: var(--font);
      min-height: 100vh;
    }

    /* ── LOGIN ── */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1.5rem;
      padding: 2rem;
    }

    #login-screen h1 {
      font-size: 1rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    #login-screen h1 span { color: var(--accent); }

    .login-box {
      width: 100%;
      max-width: 380px;
      border: 1px solid var(--border);
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .field-group label {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    input, textarea, select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--accent);
      font-family: var(--font);
      font-size: 0.85rem;
      padding: 0.65rem 0.8rem;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
    }

    textarea { resize: vertical; min-height: 80px; }

    button {
      font-family: var(--font);
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      padding: 0.7rem 1.2rem;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.75; }
    button:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-primary { background: var(--accent); color: var(--bg); }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--accent); }
    .btn-danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); }

    .error-msg {
      font-size: 0.75rem;
      color: var(--danger);
      display: none;
    }

    /* ── ADMIN SHELL ── */
    #admin-shell { display: none; }

    header {
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header .logo {
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    header .logo span { color: var(--muted); }

    header .actions { display: flex; gap: 0.75rem; align-items: center; }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--success);
      display: inline-block;
      margin-right: 0.4rem;
    }

    .status-label { font-size: 0.7rem; color: var(--muted); }

    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 2.5rem 2rem;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    .section-header h2 {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── PROJECT CARDS ── */
    #projects-list { display: flex; flex-direction: column; gap: 0.75rem; }

    .project-card {
      border: 1px solid var(--border);
      padding: 1.2rem 1.4rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      transition: border-color 0.2s;
    }

    .project-card:hover { border-color: #444; }

    .project-card.hidden-project { opacity: 0.4; }

    .project-info { flex: 1; min-width: 0; }

    .project-title {
      font-size: 0.9rem;
      margin-bottom: 0.25rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .project-meta {
      font-size: 0.7rem;
      color: var(--muted);
    }

    .project-tags { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.4rem; }

    .tag {
      font-size: 0.65rem;
      border: 1px solid var(--border);
      padding: 0.15rem 0.5rem;
      color: var(--muted);
    }

    .card-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h3 {
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .modal-close {
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }

    .modal-close:hover { color: var(--accent); opacity: 1; }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem;
      padding-top: 0.5rem;
      border-top: 1px solid var(--border);
    }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.75rem 1.2rem;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.3s, transform 0.3s;
      z-index: 999;
      pointer-events: none;
    }

    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { border-color: var(--success); color: var(--success); }
    #toast.error { border-color: var(--danger); color: var(--danger); }

    /* ── CONFIG HINT ── */
    #config-banner {
      background: #1a1500;
      border: 1px solid #4a3800;
      padding: 1rem 1.4rem;
      margin-bottom: 2rem;
      font-size: 0.75rem;
      line-height: 1.7;
      color: #c8a84b;
      display: none;
    }

    #config-banner code {
      background: rgba(200,168,75,0.12);
      padding: 0.1rem 0.35rem;
    }
  </style>
</head>
<body>

<!-- ════ LOGIN SCREEN ════ -->
<div id="login-screen">
  <h1>RM / <span>Admin</span></h1>
  <div class="login-box">
    <div class="field-group">
      <label>GitHub Personal Access Token</label>
      <input type="password" id="token-input" placeholder="ghp_..." autocomplete="off" />
    </div>
    <div class="field-group">
      <label>Repository (owner/repo)</label>
      <input type="text" id="repo-input" placeholder="ruben/rubenmano.eu" />
    </div>
    <div class="field-group">
      <label>Branch</label>
      <input type="text" id="branch-input" value="main" />
    </div>
    <div class="field-group">
      <label>Path to projects.json</label>
      <input type="text" id="path-input" value="projects.json" />
    </div>
    <p class="error-msg" id="login-error">Could not connect. Check token and repo.</p>
    <button class="btn-primary" id="login-btn" onclick="doLogin()">Connect →</button>
  </div>
  <p style="font-size:0.65rem; color: var(--muted); text-align:center; max-width:340px; line-height:1.6;">
    Your token is stored only in <code style="color:#888">localStorage</code> on this device and never sent anywhere except the GitHub API.
  </p>
</div>

<!-- ════ ADMIN SHELL ════ -->
<div id="admin-shell">
  <header>
    <div class="logo">RM / <span>Projects</span></div>
    <div class="actions">
      <span class="status-dot"></span>
      <span class="status-label" id="repo-label">—</span>
      <button class="btn-ghost" onclick="openModal()">+ New</button>
      <button class="btn-ghost" onclick="doLogout()">Logout</button>
    </div>
  </header>

  <main>
    <div id="config-banner"></div>

    <div class="section-header">
      <h2>Work / Projects</h2>
      <button class="btn-primary" id="save-btn" onclick="saveToGitHub()">Save to GitHub</button>
    </div>

    <div id="projects-list"></div>
  </main>
</div>

<!-- ════ EDIT MODAL ════ -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">New Project</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <input type="hidden" id="edit-id" />

    <div class="field-group">
      <label>Title *</label>
      <input type="text" id="edit-title" placeholder="My Awesome Project" />
    </div>
    <div class="field-group">
      <label>Description</label>
      <textarea id="edit-desc" placeholder="What does it do?"></textarea>
    </div>
    <div class="field-group">
      <label>URL</label>
      <input type="url" id="edit-url" placeholder="https://github.com/..." />
    </div>
    <div class="field-group">
      <label>Year</label>
      <input type="text" id="edit-year" placeholder="2024" maxlength="4" />
    </div>
    <div class="field-group">
      <label>Tags (comma-separated)</label>
      <input type="text" id="edit-tags" placeholder="React, Node.js, PostgreSQL" />
    </div>
    <div class="field-group">
      <label>Visible on site</label>
      <select id="edit-visible">
        <option value="true">Yes</option>
        <option value="false">No</option>
      </select>
    </div>

    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveProject()">Save Project</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  // ── STATE ──────────────────────────────────────────────────
  let state = {
    token: '',
    repo: '',
    branch: 'main',
    filePath: 'projects.json',
    sha: '',          // current file SHA (needed for GitHub updates)
    projects: []
  };

  // ── BOOT ───────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('rm_admin_config');
    if (saved) {
      const cfg = JSON.parse(saved);
      state.token    = cfg.token    || '';
      state.repo     = cfg.repo     || '';
      state.branch   = cfg.branch   || 'main';
      state.filePath = cfg.filePath || 'projects.json';

      document.getElementById('token-input').value  = state.token;
      document.getElementById('repo-input').value   = state.repo;
      document.getElementById('branch-input').value = state.branch;
      document.getElementById('path-input').value   = state.filePath;

      if (state.token && state.repo) loadFromGitHub();
    }
  });

  // ── LOGIN ──────────────────────────────────────────────────
  async function doLogin() {
    state.token    = document.getElementById('token-input').value.trim();
    state.repo     = document.getElementById('repo-input').value.trim();
    state.branch   = document.getElementById('branch-input').value.trim() || 'main';
    state.filePath = document.getElementById('path-input').value.trim() || 'projects.json';

    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.textContent = 'Connecting…';

    const ok = await loadFromGitHub();
    if (!ok) {
      document.getElementById('login-error').style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Connect →';
      return;
    }

    localStorage.setItem('rm_admin_config', JSON.stringify({
      token: state.token, repo: state.repo,
      branch: state.branch, filePath: state.filePath
    }));
  }

  function doLogout() {
    localStorage.removeItem('rm_admin_config');
    location.reload();
  }

  // ── GITHUB API ─────────────────────────────────────────────
  async function loadFromGitHub() {
    try {
      const url = `https://api.github.com/repos/${state.repo}/contents/${state.filePath}?ref=${state.branch}`;
      const res = await fetch(url, {
        headers: {
          Authorization: `Bearer ${state.token}`,
          Accept: 'application/vnd.github+json'
        }
      });

      if (!res.ok) return false;

      const data = await res.json();
      state.sha = data.sha;
      state.projects = JSON.parse(atob(data.content.replace(/\n/g, '')));

      showShell();
      return true;
    } catch (e) {
      return false;
    }
  }

  async function saveToGitHub() {
    const btn = document.getElementById('save-btn');
    btn.disabled = true;
    btn.textContent = 'Saving…';

    try {
      const content = btoa(unescape(encodeURIComponent(
        JSON.stringify(state.projects, null, 2)
      )));

      const body = {
        message: 'admin: update projects.json',
        content,
        branch: state.branch,
        sha: state.sha
      };

      const url = `https://api.github.com/repos/${state.repo}/contents/${state.filePath}`;
      const res = await fetch(url, {
        method: 'PUT',
        headers: {
          Authorization: `Bearer ${state.token}`,
          Accept: 'application/vnd.github+json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(body)
      });

      const data = await res.json();

      if (!res.ok) {
        toast(`Error: ${data.message}`, 'error');
        return;
      }

      state.sha = data.content.sha;
      toast('Saved! Netlify is rebuilding…', 'success');
    } catch (e) {
      toast('Network error. Try again.', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Save to GitHub';
    }
  }

  // ── UI ─────────────────────────────────────────────────────
  function showShell() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-shell').style.display  = 'block';
    document.getElementById('repo-label').textContent = `${state.repo} / ${state.branch}`;
    renderProjects();
  }

  function renderProjects() {
    const list = document.getElementById('projects-list');

    if (!state.projects.length) {
      list.innerHTML = `<p style="color:var(--muted);font-size:.8rem;">No projects yet. Click "+ New" to add one.</p>`;
      return;
    }

    list.innerHTML = state.projects.map((p, i) => `
      <div class="project-card ${p.visible === false ? 'hidden-project' : ''}" data-id="${p.id}">
        <div class="project-info">
          <div class="project-title">${esc(p.title || '—')}</div>
          <div class="project-meta">${esc(p.year || '')} ${p.url ? `· <a href="${esc(p.url)}" target="_blank" style="color:var(--muted)">${esc(p.url)}</a>` : ''}</div>
          ${p.tags?.length ? `<div class="project-tags">${p.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div>` : ''}
        </div>
        <div class="card-actions">
          <button class="btn-ghost" onclick="moveUp(${i})" ${i === 0 ? 'disabled' : ''} title="Move up">↑</button>
          <button class="btn-ghost" onclick="moveDown(${i})" ${i === state.projects.length - 1 ? 'disabled' : ''} title="Move down">↓</button>
          <button class="btn-ghost" onclick="openModal(${i})">Edit</button>
          <button class="btn-danger" onclick="deleteProject(${i})">Del</button>
        </div>
      </div>
    `).join('');
  }

  // ── MODAL ──────────────────────────────────────────────────
  let editingIndex = null;

  function openModal(index) {
    editingIndex = index ?? null;
    const isNew = editingIndex === null;
    const p = isNew ? {} : state.projects[editingIndex];

    document.getElementById('modal-title').textContent = isNew ? 'New Project' : 'Edit Project';
    document.getElementById('edit-id').value       = p.id    || crypto.randomUUID().slice(0, 8);
    document.getElementById('edit-title').value    = p.title || '';
    document.getElementById('edit-desc').value     = p.description || '';
    document.getElementById('edit-url').value      = p.url   || '';
    document.getElementById('edit-year').value     = p.year  || new Date().getFullYear();
    document.getElementById('edit-tags').value     = (p.tags || []).join(', ');
    document.getElementById('edit-visible').value  = String(p.visible !== false);

    document.getElementById('modal').classList.add('open');
    document.getElementById('edit-title').focus();
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    editingIndex = null;
  }

  function saveProject() {
    const title = document.getElementById('edit-title').value.trim();
    if (!title) { toast('Title is required', 'error'); return; }

    const project = {
      id:          document.getElementById('edit-id').value,
      title,
      description: document.getElementById('edit-desc').value.trim(),
      url:         document.getElementById('edit-url').value.trim(),
      year:        document.getElementById('edit-year').value.trim(),
      tags:        document.getElementById('edit-tags').value
                     .split(',').map(t => t.trim()).filter(Boolean),
      visible:     document.getElementById('edit-visible').value === 'true'
    };

    if (editingIndex !== null) {
      state.projects[editingIndex] = project;
    } else {
      state.projects.push(project);
    }

    renderProjects();
    closeModal();
    toast('Project updated — click "Save to GitHub" to publish', 'success');
  }

  // ── REORDER & DELETE ───────────────────────────────────────
  function moveUp(i) {
    if (i === 0) return;
    [state.projects[i - 1], state.projects[i]] = [state.projects[i], state.projects[i - 1]];
    renderProjects();
  }

  function moveDown(i) {
    if (i >= state.projects.length - 1) return;
    [state.projects[i], state.projects[i + 1]] = [state.projects[i + 1], state.projects[i]];
    renderProjects();
  }

  function deleteProject(i) {
    if (!confirm(`Delete "${state.projects[i].title}"?`)) return;
    state.projects.splice(i, 1);
    renderProjects();
    toast('Deleted — click "Save to GitHub" to publish', 'success');
  }

  // ── TOAST ──────────────────────────────────────────────────
  let toastTimer;
  function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = ''; }, 3500);
  }

  // ── UTILS ──────────────────────────────────────────────────
  function esc(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Close modal on overlay click
  document.getElementById('modal').addEventListener('click', e => {
    if (e.target === document.getElementById('modal')) closeModal();
  });
</script>
</body>
</html>
